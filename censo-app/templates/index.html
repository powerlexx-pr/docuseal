<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Censo | UCMXLAPUBLICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#00bf63] min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div class="p-8">
            <h1 class="text-3xl font-black text-center mb-2 text-[#00bf63]">UCMXLAPUBLICA</h1>
            <p class="text-center text-gray-400 font-bold text-xs uppercase mb-8">Consulta de Censo Electoral</p>
            <form method="POST" class="space-y-4">
                <input type="email" name="email" placeholder="estudiante@ucm.es" required 
                       class="w-full px-5 py-4 bg-gray-100 border-2 border-transparent rounded-2xl focus:border-[#00bf63] outline-none text-lg">
                <button type="submit" class="w-full bg-[#00bf63] text-white font-black py-4 rounded-2xl shadow-lg text-lg uppercase">Verificar</button>
            </form>
            {% if email %}
            <div class="mt-8 pt-8 border-t-4 border-dotted border-gray-100">
                {% if status %}
                    <div class="bg-red-600 rounded-2xl p-6 text-center text-white">
                        <h3 class="font-black text-2xl uppercase text-white">YA HA VOTADO</h3>
                        <p class="font-bold opacity-90 mt-1">{{ status }}</p>
                    </div>
                {% else %}
                    <div class="bg-white border-4 border-[#00bf63] rounded-2xl p-6 text-center">
                        <h3 class="text-[#00bf63] font-black text-2xl uppercase">PUEDE VOTAR</h3>
                        <p class="text-gray-500 font-bold mt-1">No hay registros previos.</p>
                        <form action="/register" method="POST" class="mt-6">
                            <input type="hidden" name="email" value="{{ email }}">
                            <button type="submit" class="bg-black text-white text-sm font-black py-4 px-8 rounded-full uppercase">Marcar Voto en Mesa</button>
                        </form>
                    </div>
                {% endif %}
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
